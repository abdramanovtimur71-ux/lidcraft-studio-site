<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="1280" height="720" rx="24" fill="#0F1221"/><rect x="70" y="60" width="1140" height="600" rx="24" fill="#171A2E" stroke="#2B3152"/><text x="118" y="140" fill="#F5F7FF" font-size="46" font-family="Segoe UI, Arial" font-weight="700">Сценарий 1: клиент пишет голосом</text><rect x="118" y="190" width="560" height="120" rx="16" fill="#23294B"/><text x="150" y="247" fill="#F5F7FF" font-size="28" font-family="Segoe UI, Arial">Клиент: (голосовое) «Нужен бот для записи»</text><rect x="610" y="350" width="520" height="180" rx="16" fill="#7F8CFF"/><text x="640" y="410" fill="#FFFFFF" font-size="28" font-family="Segoe UI, Arial">Бот распознает голос, отвечает кратко</text><text x="640" y="452" fill="#FFFFFF" font-size="28" font-family="Segoe UI, Arial">и уточняет дедлайн, нишу, формат.</text><text x="640" y="494" fill="#FFFFFF" font-size="28" font-family="Segoe UI, Arial">При необходимости — отправляет голосом.</text><text x="120" y="600" fill="#B8C0DD" font-size="26" font-family="Segoe UI, Arial">Результат: клиент получает быстрый и понятный ответ за минуты.</text></svg>