<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="1280" height="720" rx="24" fill="#0F1221"/><rect x="70" y="60" width="1140" height="600" rx="24" fill="#171A2E" stroke="#2B3152"/><text x="118" y="140" fill="#F5F7FF" font-size="46" font-family="Segoe UI, Arial" font-weight="700">Сценарий 2: обработка звонков</text><rect x="118" y="220" width="330" height="300" rx="16" fill="#23294B"/><text x="150" y="280" fill="#F5F7FF" font-size="28" font-family="Segoe UI, Arial">Режим A</text><text x="150" y="326" fill="#B8C0DD" font-size="24" font-family="Segoe UI, Arial">Отклонить звонок +</text><text x="150" y="364" fill="#B8C0DD" font-size="24" font-family="Segoe UI, Arial">короткий автоответ</text><rect x="475" y="220" width="330" height="300" rx="16" fill="#23294B"/><text x="507" y="280" fill="#F5F7FF" font-size="28" font-family="Segoe UI, Arial">Режим B</text><text x="507" y="326" fill="#B8C0DD" font-size="24" font-family="Segoe UI, Arial">Не отклонять звонок</text><text x="507" y="364" fill="#B8C0DD" font-size="24" font-family="Segoe UI, Arial">+ ответ в чат</text><rect x="832" y="220" width="330" height="300" rx="16" fill="#23294B"/><text x="864" y="280" fill="#F5F7FF" font-size="28" font-family="Segoe UI, Arial">Режим C</text><text x="864" y="326" fill="#B8C0DD" font-size="24" font-family="Segoe UI, Arial">Только отклонение</text><text x="864" y="364" fill="#B8C0DD" font-size="24" font-family="Segoe UI, Arial">без сообщения</text><text x="118" y="590" fill="#B8C0DD" font-size="26" font-family="Segoe UI, Arial">Гибкость под процесс команды: выбираем режим под ваш стиль общения.</text></svg>