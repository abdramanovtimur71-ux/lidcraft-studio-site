<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="1280" height="720" rx="24" fill="#0F1221"/><rect x="70" y="60" width="1140" height="600" rx="24" fill="#171A2E" stroke="#2B3152"/><text x="118" y="140" fill="#F5F7FF" font-size="46" font-family="Segoe UI, Arial" font-weight="700">Сценарий 3: расширенные ответы</text><rect x="118" y="200" width="1040" height="110" rx="16" fill="#23294B"/><text x="150" y="265" fill="#F5F7FF" font-size="30" font-family="Segoe UI, Arial">Бот отвечает на вопросы по услугам, ценам, процессу и смежным темам.</text><rect x="118" y="340" width="1040" height="230" rx="16" fill="#7F8CFF"/><text x="150" y="404" fill="#FFFFFF" font-size="29" font-family="Segoe UI, Arial">✓ Краткий режим: 1–4 предложения</text><text x="150" y="452" fill="#FFFFFF" font-size="29" font-family="Segoe UI, Arial">✓ Расширенный режим: подробнее по запросу клиента</text><text x="150" y="500" fill="#FFFFFF" font-size="29" font-family="Segoe UI, Arial">✓ Естественный диалог и удержание клиента в переписке</text><text x="118" y="620" fill="#B8C0DD" font-size="26" font-family="Segoe UI, Arial">Итог: бот закрывает типовые вопросы, команда фокусируется на продажах.</text></svg>